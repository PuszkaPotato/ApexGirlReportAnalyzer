name: Build and Push Docker Images

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ApexGirlReportAnalyzer.API/Dockerfile
          push: true
          tags: |
            ghcr.io/puszkapotato/apexgirl-api:latest
            ghcr.io/puszkapotato/apexgirl-api:${{ github.sha }}

      - name: Build and push Bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ApexGirlReportAnalyzer.Bot/Dockerfile
          push: true
          tags: |
            ghcr.io/puszkapotato/apexgirl-bot:latest
            ghcr.io/puszkapotato/apexgirl-bot:${{ github.sha }}
