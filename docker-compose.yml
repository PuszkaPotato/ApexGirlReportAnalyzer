services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: apexgirl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/puszkapotato/apexgirl-api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Database=apexgirl;Username=postgres;Password=${POSTGRES_PASSWORD}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      OpenAI__Model: gpt-4.1-mini
      App__DeveloperDiscordId: ${DEVELOPER_DISCORD_ID}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/status/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  bot:
    image: ghcr.io/puszkapotato/apexgirl-bot:latest
    environment:
      Bot__Token: ${BOT_TOKEN}
      Bot__DeveloperId: ${DEVELOPER_DISCORD_ID}
      Api__BaseUrl: http://api:8080
      Api__ApiKey: ${API_KEY}
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
